<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 회원정보 수정</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/mypage.css">
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">MoneyMate</a>

        <nav class="nav">
            <a href="/mypage">MY 자산</a>
            <a href="#">포트폴리오</a>
            <a href="#">대시보드</a>
            <a href="/investment-info">투자정보</a>
            <a href="#">고객센터</a>
        </nav>

        <div class="header-buttons">
            <a href="/mypage" class="login-btn">마이페이지</a>
            <a href="/logout" class="login-btn">로그아웃</a>
        </div>
    </div>
</header>

<main class="mypage-main">

    <section class="mypage-hero">
        <div>
            <p class="page-badge">EDIT PROFILE</p>
            <h1>회원 정보 수정</h1>
            <p class="hero-desc">
                이름, 이메일, 생년월일 정보를 수정할 수 있습니다.
            </p>
        </div>
    </section>

    <section class="dashboard-grid">
        <div class="info-card large-card">

            <form th:action="@{/mypage/edit}" th:object="${memberUpdateRequest}" method="post">

                <div class="profile-info-list">

                    <div class="profile-info-item">
                        <span>이름</span>
                        <input type="text" th:field="*{name}" placeholder="이름 입력">
                    </div>

                    <div class="profile-info-item">
                        <span>이메일</span>
                        <input type="email" th:field="*{email}" placeholder="이메일 입력">
                    </div>

                    <div class="profile-info-item">
                        <span>생년월일</span>
                        <input type="date" th:field="*{birthDate}">
                    </div>

                </div>

                <button type="submit" class="full-blue-btn" style="margin-top: 24px;">
                    수정 완료
                </button>

                <a href="/mypage" class="full-outline-btn" style="margin-top: 12px;">
                    취소
                </a>

            </form>

        </div>
    </section>

</main>

</body>
</html>
