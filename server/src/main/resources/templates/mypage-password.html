<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>MoneyMate - 비밀번호 변경</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/mypage.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">MoneyMate</a>

    <nav class="nav">
      <a href="/mypage">MY 자산</a>
      <a href="#">포트폴리오</a>
      <a href="#">대시보드</a>
      <a href="/investment-info">투자정보</a>
      <a href="#">고객센터</a>
    </nav>

    <div class="header-buttons">
      <a href="/mypage" class="login-btn">마이페이지</a>
      <a href="/logout" class="login-btn">로그아웃</a>
    </div>
  </div>
</header>

<main class="mypage-main">

  <section class="mypage-hero">
    <div>
      <p class="page-badge">SECURITY</p>
      <h1>비밀번호 변경</h1>
      <p class="hero-desc">
        안전한 자산관리를 위해 주기적으로 비밀번호를 변경해주세요.
      </p>
    </div>
  </section>

  <section class="dashboard-grid">
    <div class="info-card large-card">

      <form th:action="@{/mypage/password}" th:object="${passwordChangeRequest}" method="post">

        <div class="profile-info-list">

          <div class="profile-info-item">
            <span>현재 비밀번호</span>
            <input type="password" th:field="*{currentPassword}" placeholder="현재 비밀번호 입력">
          </div>

          <div class="profile-info-item">
            <span>새 비밀번호</span>
            <input type="password" th:field="*{newPassword}" placeholder="새 비밀번호 입력">
          </div>

          <div class="profile-info-item">
            <span>새 비밀번호 확인</span>
            <input type="password" th:field="*{confirmPassword}" placeholder="새 비밀번호 다시 입력">
          </div>

        </div>

        <p th:if="${errorMessage}" th:text="${errorMessage}" style="color:#dc2626; margin-top:16px; font-weight:700;"></p>
        <p th:if="${successMessage}" th:text="${successMessage}" style="color:#155eef; margin-top:16px; font-weight:700;"></p>

        <button type="submit" class="full-blue-btn" style="margin-top: 24px;">
          비밀번호 변경
        </button>

        <a href="/mypage" class="full-outline-btn" style="margin-top: 12px;">
          마이페이지로 돌아가기
        </a>

      </form>

    </div>
  </section>

</main>

</body>
</html>
