<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 관리자</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body { background: #f8fafc; }
        .admin-header { border-bottom: 1px solid #d0d5dd; background: #fff; }
        .admin-nav { max-width: 1180px; margin: 0 auto; display: flex; gap: 36px; align-items: center; padding: 12px 16px; }
        .admin-logo { font-weight: 800; color: #155eef; }
        .admin-nav a { border: 1px solid #d0d5dd; border-radius: 6px; padding: 10px 24px; color: #101828; text-decoration: none; background: #fff; }
        .admin-nav .logout { margin-left: auto; }
        .admin-main { max-width: 1040px; min-height: 610px; margin: 0 auto; padding: 90px 16px 80px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 38px; align-items: stretch; }
        .admin-card { min-height: 170px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #101828; font-size: 22px; font-weight: 800; }
        .admin-card.wide { grid-column: span 2; }
        .admin-card.tall { grid-row: span 2; min-height: 360px; }
        .admin-footer { height: 110px; background: #777; color: #fff; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<header class="admin-header">
    <nav class="admin-nav">
        <div class="admin-logo">관리자 화면</div>
        <a href="/admin">회원정보관리</a>
        <a href="/admin">투자정보관리</a>
        <a href="/admin/community">커뮤니티관리</a>
        <a href="/admin">고객문의관리</a>
        <a class="logout" href="/logout">로그아웃</a>
    </nav>
</header>

<main class="admin-main">
    <section class="admin-grid">
        <a class="admin-card" href="/admin">회원정보</a>
        <a class="admin-card" href="/admin/community">커뮤니티글</a>
        <a class="admin-card tall" href="/admin">고객 문의</a>
        <a class="admin-card wide" href="/admin">투자정보</a>
    </section>
</main>

<footer class="admin-footer">Footer 영역</footer>
</body>
</html>
