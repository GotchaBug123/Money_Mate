<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate 게시글 수정</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .admin-form-card textarea {
            border: 1px solid #dbe3ef;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            min-height: 240px;
            resize: vertical;
        }
        .admin-form-card input[readonly] { background: #f8fafc; color: #64748b; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .attachment-box {
            background: #f8fafc;
            border: 1px solid #dbe3ef;
            border-radius: 14px;
            padding: 14px 16px;
        }
        .attachment-box ul { margin: 0 0 12px; padding-left: 18px; }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <a href="/" class="admin-logo">MoneyMate</a>
        <nav class="admin-menu">
            <a href="/admin">관리자 홈</a>
            <a href="/admin/members">회원정보 관리</a>
            <a href="/admin/investment-info">투자정보 관리</a>
            <a href="/admin/community" class="active">커뮤니티 관리</a>
            <a href="/admin/notices">공지사항 관리</a>
            <a href="/admin/inquiries">고객문의 관리</a>
            <a href="/logout">로그아웃</a>
        </nav>
    </aside>

    <main class="admin-main">
        <section class="admin-top">
            <div>
                <h1>게시글 수정</h1>
                <p>관리자 권한으로 커뮤니티 게시글 내용을 수정합니다.</p>
            </div>
        </section>

        <section class="admin-form-card">
            <form th:action="@{/admin/community/posts/{postId}/edit(postId=${post.postId})}"
                  method="post"
                  enctype="multipart/form-data">
                <input type="hidden" name="themeId" th:value="${post.themeId}">
                <input type="hidden" name="category" th:value="${post.category}">
                <input type="hidden" name="stockSymbol" th:value="${post.stockSymbol}">
                <input type="hidden" name="stockName" th:value="${post.stockName}">

                <div th:each="attachment : ${post.attachments}">
                    <input type="hidden" name="attachmentUrl" th:value="${attachment.attachmentUrl}">
                    <input type="hidden" name="attachmentName" th:value="${attachment.attachmentName}">
                </div>

                <div class="form-grid">
                    <label>
                        회원 ID
                        <input type="text" th:value="${post.authorId}" readonly>
                    </label>
                    <label>
                        회원 이름
                        <input type="text" th:value="${post.authorName}" readonly>
                    </label>
                </div>

                <label>
                    게시글 제목
                    <input name="title" type="text" th:value="${post.title}" maxlength="150" required>
                </label>

                <label>
                    내용
                    <textarea name="content" required th:text="${post.content}"></textarea>
                </label>

                <label>
                    첨부파일
                    <div class="attachment-box">
                        <p th:if="${#lists.isEmpty(post.attachments)}">현재 첨부파일이 없습니다.</p>
                        <ul th:if="${!#lists.isEmpty(post.attachments)}">
                            <li th:each="attachment : ${post.attachments}">
                                <a th:href="${attachment.attachmentUrl}"
                                   th:text="${attachment.attachmentName}"
                                   target="_blank">첨부파일</a>
                            </li>
                        </ul>
                        <input type="file" name="files" multiple>
                    </div>
                </label>

                <div class="admin-form-actions">
                    <a class="admin-cancel-btn" th:href="@{/admin/community/posts/{postId}(postId=${post.postId})}">취소</a>
                    <button class="admin-submit-btn" type="submit">수정하기</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
