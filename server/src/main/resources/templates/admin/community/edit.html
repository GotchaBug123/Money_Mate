<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 커뮤니티관리 수정</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body { background: #f8fafc; }
        .admin-header { border-bottom: 1px solid #d0d5dd; background: #fff; }
        .admin-nav { max-width: 1180px; margin: 0 auto; display: flex; gap: 36px; align-items: center; padding: 12px 16px; }
        .admin-logo { font-weight: 800; color: #155eef; }
        .admin-nav a { border: 1px solid #d0d5dd; border-radius: 6px; padding: 10px 24px; color: #101828; text-decoration: none; background: #fff; }
        .admin-nav .logout { margin-left: auto; }
        .admin-main { max-width: 760px; min-height: 670px; margin: 0 auto; padding: 34px 16px 70px; }
        .panel { border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; padding: 30px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
        .field { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 14px; margin-bottom: 26px; align-items: center; }
        .field.full { grid-template-columns: 120px minmax(0, 1fr); }
        .label { font-weight: 800; color: #101828; font-size: 18px; }
        input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; padding: 11px 12px; color: #101828; }
        input[readonly] { background: #f2f4f7; }
        textarea { min-height: 230px; resize: vertical; }
        .attachments { border: 1px solid #d0d5dd; border-radius: 6px; background: #f2f4f7; padding: 12px; }
        .attachments ul { margin: 0 0 12px; padding-left: 20px; }
        .actions { margin-top: 28px; display: flex; justify-content: center; gap: 10px; }
        .btn { display: inline-block; border: 1px solid #155eef; border-radius: 6px; background: #155eef; color: #fff; padding: 10px 30px; text-decoration: none; font-weight: 700; cursor: pointer; }
        .btn.gray { border-color: #667085; background: #667085; }
        .admin-footer { height: 96px; background: #777; color: #fff; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<header class="admin-header">
    <nav class="admin-nav">
        <div class="admin-logo">관리자 화면</div>
        <a href="/admin">회원정보관리</a>
        <a href="/admin">투자정보관리</a>
        <a href="/admin/community">커뮤니티관리</a>
        <a href="/admin">고객문의관리</a>
        <a class="logout" href="/logout">로그아웃</a>
    </nav>
</header>

<main class="admin-main">
    <form class="panel" th:action="@{/admin/community/posts/{postId}/edit(postId=${post.postId})}"
          method="post" enctype="multipart/form-data">
        <input type="hidden" name="themeId" th:value="${post.themeId}">
        <input type="hidden" name="category" th:value="${post.category}">
        <input type="hidden" name="stockSymbol" th:value="${post.stockSymbol}">
        <input type="hidden" name="stockName" th:value="${post.stockName}">

        <div th:each="attachment : ${post.attachments}">
            <input type="hidden" name="attachmentUrl" th:value="${attachment.attachmentUrl}">
            <input type="hidden" name="attachmentName" th:value="${attachment.attachmentName}">
        </div>

        <div class="top-grid">
            <label class="field">
                <span class="label">회원 ID</span>
                <input type="text" th:value="${post.authorId}" readonly>
            </label>
            <label class="field">
                <span class="label">회원 이름</span>
                <input type="text" th:value="${post.authorName}" readonly>
            </label>
        </div>

        <label class="field full">
            <span class="label">게시글 제목</span>
            <input name="title" type="text" th:value="${post.title}" maxlength="150" required>
        </label>

        <label class="field full">
            <span class="label">내용</span>
            <textarea name="content" required th:text="${post.content}"></textarea>
        </label>

        <div class="field full">
            <div class="label">첨부파일</div>
            <div class="attachments">
                <span th:if="${#lists.isEmpty(post.attachments)}">현재 첨부파일 없음</span>
                <ul th:if="${!#lists.isEmpty(post.attachments)}">
                    <li th:each="attachment : ${post.attachments}">
                        <a th:href="${attachment.attachmentUrl}" th:text="${attachment.attachmentName}" target="_blank">첨부파일</a>
                    </li>
                </ul>
                <input type="file" name="files" multiple>
            </div>
        </div>

        <div class="actions">
            <a class="btn gray" th:href="@{/admin/community/posts/{postId}(postId=${post.postId})}">취소</a>
            <button class="btn" type="submit">수정하기</button>
        </div>
    </form>
</main>

<footer class="admin-footer">Footer 영역</footer>
</body>
</html>
