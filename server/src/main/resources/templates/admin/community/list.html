<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 커뮤니티관리</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body { background: #f8fafc; }
        .admin-header { border-bottom: 1px solid #d0d5dd; background: #fff; }
        .admin-nav { max-width: 1180px; margin: 0 auto; display: flex; gap: 36px; align-items: center; padding: 12px 16px; }
        .admin-logo { font-weight: 800; color: #155eef; }
        .admin-nav a { border: 1px solid #d0d5dd; border-radius: 6px; padding: 10px 24px; color: #101828; text-decoration: none; background: #fff; }
        .admin-nav .logout { margin-left: auto; }
        .admin-main { max-width: 1120px; min-height: 670px; margin: 0 auto; padding: 60px 16px; }
        .message { margin-bottom: 14px; padding: 12px; border: 1px solid #c7d7fe; border-radius: 8px; color: #155eef; background: #eff4ff; font-weight: 700; }
        .table-wrap { min-height: 560px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; padding: 28px 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eaecf0; padding: 14px 10px; text-align: left; vertical-align: middle; }
        th { color: #101828; font-size: 17px; }
        td { color: #344054; }
        .actions { display: flex; gap: 6px; }
        .btn { display: inline-block; border: 1px solid #155eef; border-radius: 6px; background: #155eef; color: #fff; padding: 7px 10px; text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        .btn.gray { border-color: #667085; background: #667085; }
        .btn.red { border-color: #f04438; background: #f04438; }
        .empty { text-align: center; color: #667085; padding: 80px 0; }
        .pager { margin-top: 18px; display: flex; justify-content: center; gap: 10px; }
        .pager a, .pager span { border: 1px solid #d0d5dd; border-radius: 6px; padding: 8px 12px; color: #344054; background: #fff; text-decoration: none; }
        .admin-footer { height: 96px; background: #777; color: #fff; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<header class="admin-header">
    <nav class="admin-nav">
        <div class="admin-logo">관리자 화면</div>
        <a href="/admin">회원정보관리</a>
        <a href="/admin">투자정보관리</a>
        <a href="/admin/community">커뮤니티관리</a>
        <a href="/admin">고객문의관리</a>
        <a class="logout" href="/logout">로그아웃</a>
    </nav>
</header>

<main class="admin-main">
    <div th:if="${message}" class="message" th:text="${message}"></div>

    <section class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>게시글 번호</th>
                <th>제목</th>
                <th>작성자 회원 ID</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.postId}">1</td>
                <td>
                    <span th:text="${post.title}">제목</span>
                    <span th:if="${post.edited}" class="meta">(수정됨)</span>
                </td>
                <td th:text="${post.authorId}">1</td>
                <td th:text="${post.authorName}">작성자</td>
                <td>
                    <span th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : (post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm') : '-')}">2026-05-28</span>
                    <span th:if="${post.edited}" class="meta"> · 수정됨</span>
                </td>
                <td>
                    <div class="actions">
                        <a class="btn" th:href="@{/admin/community/posts/{postId}(postId=${post.postId})}">확인</a>
                        <a class="btn gray" th:href="@{/admin/community/posts/{postId}/edit(postId=${post.postId})}">수정</a>
                        <form th:action="@{/admin/community/posts/{postId}/delete(postId=${post.postId})}" method="post"
                              onsubmit="return confirm('이 게시글을 삭제하시겠습니까?');">
                            <button class="btn red" type="submit">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(posts)}">
                <td class="empty" colspan="6">등록된 게시글이 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div class="pager">
            <a th:if="${postPage.hasPrevious}" th:href="@{/admin/community(page=${postPage.page - 1}, size=${postPage.size})}">이전</a>
            <span th:text="|${postPage.page + 1} / ${postPage.totalPages == 0 ? 1 : postPage.totalPages}|">1 / 1</span>
            <a th:if="${postPage.hasNext}" th:href="@{/admin/community(page=${postPage.page + 1}, size=${postPage.size})}">다음</a>
        </div>
    </section>
</main>

<footer class="admin-footer">Footer 영역</footer>
</body>
</html>
