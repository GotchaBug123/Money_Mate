<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate 관리자</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">

        <div class="admin-logo">
            MoneyMate Admin
        </div>

        <nav class="admin-menu">

            <a href="/admin" class="active">
                대시보드
            </a>

            <a href="/admin/members">
                회원정보 관리
            </a>

            <a href="#">
                투자정보 관리
            </a>

            <a href="#">
                공지사항 관리
            </a>

            <a href="/admin/inquiries">
                고객문의 관리
            </a>

            <a href="/logout">
                로그아웃
            </a>

        </nav>

    </aside>

    <main class="admin-main">

        <section class="admin-top">

            <div>
                <h1>관리자 대시보드</h1>

                <p>
                    MoneyMate 서비스 운영 현황을 확인하세요.
                </p>
            </div>

        </section>

        <section class="admin-stat-grid">

            <a href="/admin/members" class="admin-stat-link">
                <div class="admin-stat-card">

                    <span>전체 회원</span>

                    <strong th:text="${userCount} + '명'">
                        0명
                    </strong>

                </div>
            </a>

            <a href="/admin/inquiries" class="admin-stat-link">
                <div class="admin-stat-card">

                    <span>전체 문의</span>

                    <strong th:text="${totalInquiryCount} + '건'">
                        0건
                    </strong>

                </div>
            </a>

            <a href="/admin/inquiries" class="admin-stat-link">
                <div class="admin-stat-card">

                    <span>대기 문의</span>

                    <strong th:text="${waitingInquiryCount} + '건'">
                        0건
                    </strong>

                </div>
            </a>

            <a href="/customer-center" class="admin-stat-link">
                <div class="admin-stat-card">

                    <span>등록 FAQ</span>

                    <strong th:text="${faqCount} + '개'">
                        0개
                    </strong>

                </div>
            </a>

        </section>

        <section class="admin-card-section">

            <div class="admin-card">

                <h2>최근 고객 문의</h2>

                <p>
                    답변 대기 중인 문의를 확인하고 처리할 수 있습니다.
                </p>

                <a href="/admin/inquiries">
                    문의 관리로 이동
                </a>

            </div>

            <div class="admin-card">

                <h2>회원정보 관리</h2>

                <p>
                    가입 회원 정보와 권한 상태를 관리합니다.
                </p>

                <a href="/admin/members">
                    회원 관리로 이동
                </a>

            </div>

        </section>

    </main>

</div>

</body>
</html>
