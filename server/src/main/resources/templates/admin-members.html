<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate 관리자 - 회원정보 관리</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">
        <div class="admin-logo">MoneyMate Admin</div>

        <nav class="admin-menu">
            <a href="/admin">대시보드</a>
            <a href="/admin/members" class="active">회원정보 관리</a>
            <a href="#">투자정보 관리</a>
            <a href="#">공지사항 관리</a>
            <a href="/admin/inquiries">고객문의 관리</a>
            <a href="/logout">로그아웃</a>
        </nav>
    </aside>

    <main class="admin-main">

        <section class="admin-top">
            <div>
                <h1>회원정보 관리</h1>
                <p>가입 회원의 기본 정보와 권한 상태를 확인합니다.</p>
            </div>
        </section>

        <section class="admin-table-card">
            <div class="admin-table-header">
                <h2>전체 회원 목록</h2>
                <span th:text="${members != null ? #lists.size(members) + '명' : '0명'}">0명</span>
            </div>

            <table class="admin-table">
                <thead>
                <tr>
                    <th>회원번호</th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>권한</th>
                    <th>상태</th>
                    <th>가입일</th>
                    <th>관리</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${members == null or #lists.isEmpty(members)}">
                    <td colspan="8" class="empty-table">
                        등록된 회원이 없습니다.
                    </td>
                </tr>

                <tr th:each="member : ${members}" th:if="${member != null}">
                    <td th:text="${member.memberId}">1</td>
                    <td th:text="${member.loginId}">test1</td>
                    <td th:text="${member.name}">홍길동</td>
                    <td th:text="${member.email}">test@test.com</td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${member.role == 'ADMIN'} ? ' admin' : ''"
                              th:text="${member.role}">
                            USER
                        </span>
                    </td>
                    <td th:text="${member.signupStatus}">ACTIVE</td>
                    <td th:text="${member.createdAt != null ? #temporals.format(member.createdAt, 'yyyy.MM.dd') : '-'}">
                        2026.05.28
                    </td>
                    <td>
                        <a class="admin-edit-btn"
                           th:href="@{/admin/members/{id}/edit(id=${member.memberId})}">
                            수정
                        </a>

                        <form th:action="@{/admin/members/{id}/delete(id=${member.memberId})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <button type="submit" class="admin-delete-btn">
                                삭제
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>

</div>

</body>
</html>
