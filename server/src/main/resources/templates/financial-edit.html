<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 재무정보 수정</title>

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/financial-edit.css">
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/main" class="logo">MoneyMate</a>

        <nav class="nav">
            <div class="nav-dropdown">
                <a href="/my-asset" class="nav-link active">MY 자산</a>

                <div class="dropdown-menu">
                    <a href="/my-asset/financial">내 재무 정보</a>
                    <a href="/my-investment">내 투자 정보</a>
                </div>
            </div>

            <a href="#">포트폴리오</a>
            <a href="#">대시보드</a>
            <a href="#">투자정보</a>
            <a href="#">고객센터</a>
        </nav>

        <a href="/mypage" class="mypage-btn">마이페이지</a>
    </div>
</header>

<main class="edit-page">

    <section class="edit-card">

        <p class="eyebrow">EDIT FINANCIAL INFO</p>
        <h1>재무정보 수정</h1>
        <p class="desc">수입, 지출, 자산 정보를 수정하면 투자 가능 금액이 다시 계산됩니다.</p>

        <form action="/my-asset/financial/edit" method="post" class="edit-form">

            <div class="form-grid">

                <div class="form-group">
                    <label>월 수입</label>
                    <input type="number" name="monthlyIncome"
                           th:value="${profile != null ? profile.monthlyIncome : 0}" required>
                </div>

                <div class="form-group">
                    <label>월 고정 지출</label>
                    <input type="number" name="monthlyFixedExpense"
                           th:value="${profile != null ? profile.monthlyFixedExpense : 0}" required>
                </div>

                <div class="form-group">
                    <label>월 변동 지출</label>
                    <input type="number" name="monthlyVariableExpense"
                           th:value="${profile != null ? profile.monthlyVariableExpense : 0}" required>
                </div>

                <div class="form-group">
                    <label>총 자산</label>
                    <input type="number" name="totalAsset"
                           th:value="${profile != null ? profile.totalAsset : 0}" required>
                </div>

                <div class="form-group">
                    <label>총 부채</label>
                    <input type="number" name="totalLiability"
                           th:value="${profile != null ? profile.totalLiability : 0}" required>
                </div>

                <div class="form-group">
                    <label>보유 현금</label>
                    <input type="number" name="cashAsset"
                           th:value="${profile != null ? profile.cashAsset : 0}" required>
                </div>

            </div>

            <div class="button-row">
                <a href="/my-asset/financial" class="cancel-btn">취소</a>
                <button type="submit" class="save-btn">수정 완료</button>
            </div>

        </form>

    </section>

</main>

</body>
</html>
