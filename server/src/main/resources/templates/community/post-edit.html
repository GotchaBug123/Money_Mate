<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 게시글 수정</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .page { max-width: 860px; margin: 0 auto; padding: 34px 20px 70px; background: #f8fafc; min-height: calc(100vh - 78px); }
        .panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 22px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; margin: 12px 0 6px; font-weight: 700; }
        input, select, textarea { width: 100%; border: 1px solid #d0d5dd; border-radius: 6px; padding: 10px; background: #ffffff; }
        textarea { min-height: 180px; resize: vertical; }
        .btn { border: 1px solid #d0d5dd; border-radius: 8px; background: #ffffff; padding: 11px 18px; font-weight: 700; cursor: pointer; }
        .btn.primary { border-color: #155eef; background: #155eef; color: #ffffff; }
        @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: globalHeader('community')}"></header>

<main class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
        <div>
            <h1>게시글 수정</h1>
            <p style="color:#667085;">작성자만 수정할 수 있습니다.</p>
        </div>
        <a class="btn" href="/community/my-posts/view">내 게시글</a>
    </div>
    <section class="panel">
        <form id="editForm">
            <div class="grid">
                <div>
                    <label for="themeId">테마</label>
                    <select id="themeId"><option value="">테마 선택 없음</option></select>
                </div>
                <div>
                    <label for="category">카테고리</label>
                    <input id="category" type="text" required>
                </div>
                <div>
                    <label for="stockSymbol">종목코드</label>
                    <input id="stockSymbol" type="text">
                </div>
                <div>
                    <label for="stockName">종목명</label>
                    <input id="stockName" type="text">
                </div>
            </div>
            <label for="title">게시글 제목</label>
            <input id="title" type="text" required>
            <label for="content">내용</label>
            <textarea id="content" required></textarea>
            <div id="attachmentInfo" style="margin-top:12px; color:#667085;"></div>
            <div style="display:flex; gap:10px; margin-top:18px;">
                <button class="btn primary" type="submit">수정하기</button>
                <a id="cancelLink" class="btn" href="/community/my-posts/view">취소</a>
            </div>
        </form>
    </section>
</main>

<footer class="footer"><p>© 2026 MoneyMate. All rights reserved.</p></footer>

<script th:inline="javascript">
    const postId = /*[[${postId}]]*/ 0;
    let currentPost = null;

    document.addEventListener('DOMContentLoaded', async () => {
        await loadThemes();
        await loadPost();
        document.getElementById('editForm').addEventListener('submit', updatePost);
    });

    async function api(url, options = {}) {
        const response = await fetch(url, {credentials: 'same-origin', ...options});
        const text = await response.text();
        const body = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(body?.message || body?.error || response.statusText);
        return body;
    }

    async function loadThemes() {
        const themes = await api('/community/themes');
        document.getElementById('themeId').innerHTML = '<option value="">테마 선택 없음</option>' + themes
            .map(theme => `<option value="${theme.themeId}">${escapeHtml(theme.themeName)}</option>`)
            .join('');
    }

    async function loadPost() {
        try {
            currentPost = await api(`/community/posts/${postId}`);
            document.getElementById('themeId').value = currentPost.themeId || '';
            document.getElementById('category').value = currentPost.category || '';
            document.getElementById('title').value = currentPost.title || '';
            document.getElementById('content').value = currentPost.content || '';
            document.getElementById('stockSymbol').value = currentPost.stockSymbol || '';
            document.getElementById('stockName').value = currentPost.stockName || '';
            document.getElementById('cancelLink').href = `/community/posts/${postId}/view`;
            document.getElementById('attachmentInfo').innerHTML = (currentPost.attachments || []).length === 0
                ? '첨부파일 없음'
                : `기존 첨부파일 ${currentPost.attachments.length}개는 유지됩니다.`;
        } catch (error) {
            alert('게시글 조회 실패: ' + error.message);
        }
    }

    async function updatePost(event) {
        event.preventDefault();
        const payload = {
            themeId: valueOrNull(document.getElementById('themeId').value),
            category: document.getElementById('category').value,
            title: document.getElementById('title').value,
            content: document.getElementById('content').value,
            stockSymbol: valueOrNull(document.getElementById('stockSymbol').value),
            stockName: valueOrNull(document.getElementById('stockName').value),
            attachments: (currentPost?.attachments || []).map(file => ({
                attachmentUrl: file.attachmentUrl,
                attachmentName: file.attachmentName
            }))
        };

        try {
            await api(`/community/posts/${postId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            location.href = `/community/posts/${postId}/view`;
        } catch (error) {
            alert('게시글 수정 실패: ' + error.message);
        }
    }

    function valueOrNull(value) { return value && value.trim() ? value.trim() : null; }
    function escapeHtml(value) { return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
</script>
</body>
</html>
