<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 커뮤니티</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .page { max-width: 1180px; margin: 0 auto; padding: 34px 20px 70px; background: #f8fafc; min-height: calc(100vh - 78px); }
        .hero { display: flex; justify-content: space-between; gap: 20px; align-items: flex-end; margin-bottom: 22px; }
        .hero h1 { font-size: 32px; margin-bottom: 8px; color: #101828; }
        .hero p { color: #667085; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { border: 1px solid #d0d5dd; border-radius: 8px; background: #ffffff; padding: 10px 16px; font-weight: 700; cursor: pointer; }
        .btn.primary { border-color: #155eef; background: #155eef; color: #ffffff; }
        .grid { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 20px; align-items: start; }
        .panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 18px; }
        .panel h2 { font-size: 20px; margin-bottom: 14px; color: #101828; }
        .search-row { display: grid; grid-template-columns: 1.4fr 0.9fr 0.9fr auto; gap: 8px; }
        input, select { width: 100%; border: 1px solid #d0d5dd; border-radius: 6px; padding: 10px; background: #ffffff; }
        .theme-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
        .theme-chip { border: 1px solid #c7d7fe; color: #155eef; background: #eff4ff; border-radius: 999px; padding: 7px 11px; cursor: pointer; }
        .post-card { border: 1px solid #eaecf0; border-radius: 8px; padding: 14px; margin-bottom: 10px; background: #ffffff; }
        .post-title { border: 0; background: transparent; font-size: 18px; font-weight: 800; color: #101828; cursor: pointer; padding: 0; text-align: left; }
        .meta { margin-top: 8px; color: #667085; font-size: 13px; }
        .popular-item { display: block; width: 100%; border: 1px solid #eaecf0; background: #ffffff; border-radius: 8px; padding: 11px; margin-bottom: 8px; text-align: left; cursor: pointer; }
        .footer { background: #ffffff; }
        @media (max-width: 900px) { .grid, .search-row { grid-template-columns: 1fr; } .hero { align-items: flex-start; flex-direction: column; } }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: globalHeader('community')}"></header>

<main class="page">
    <section class="hero">
        <div>
            <h1>커뮤니티</h1>
            <p>투자 테마와 종목별 게시글을 조회하고 작성하는 백엔드 시연용 화면입니다.</p>
        </div>
        <div class="actions">
            <a class="btn" href="/community/my-posts/view">내 게시글</a>
            <a class="btn primary" href="/community/posts/new">게시글 작성</a>
        </div>
    </section>

    <section class="grid">
        <div>
            <section class="panel" style="margin-bottom: 18px;">
                <h2>검색</h2>
                <div class="search-row">
                    <input id="keywordInput" type="text" placeholder="검색어">
                    <select id="themeFilter"><option value="">전체 테마</option></select>
                    <input id="categoryFilter" type="text" placeholder="카테고리">
                    <button type="button" class="btn primary" onclick="searchPosts()">검색</button>
                </div>
                <div id="themeList" class="theme-list"></div>
            </section>

            <section class="panel">
                <h2>게시글 목록</h2>
                <div id="postList"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 14px;">
                    <button type="button" class="btn" onclick="movePage(-1)">이전</button>
                    <span id="pageInfo" class="meta">0 / 0</span>
                    <button type="button" class="btn" onclick="movePage(1)">다음</button>
                </div>
            </section>
        </div>

        <aside>
            <section class="panel" style="margin-bottom: 18px;">
                <h2>인기글</h2>
                <div id="popularPosts"></div>
            </section>
            <section class="panel">
                <h2>인기 커뮤니티</h2>
                <div id="popularCommunities"></div>
            </section>
        </aside>
    </section>
</main>

<footer class="footer">
    <p>© 2026 MoneyMate. All rights reserved.</p>
</footer>

<script>
    const state = {page: 0, size: 8, first: true, last: false};

    document.addEventListener('DOMContentLoaded', () => {
        loadThemes();
        loadMain();
        loadPosts();
    });

    async function api(url) {
        const response = await fetch(url, {credentials: 'same-origin'});
        const body = await response.json().catch(() => null);

        if (!response.ok) {
            throw new Error(body?.message || body?.error || response.statusText);
        }

        return body;
    }

    async function loadMain() {
        try {
            const main = await api('/community/main');
            renderPopularPosts(main.popularPosts || []);
            renderPopularCommunities(main.popularCommunities || main.themes || []);
        } catch (error) {
            document.getElementById('popularPosts').innerHTML = errorBox(error.message);
        }
    }

    async function loadThemes() {
        try {
            const themes = await api('/community/themes');
            const select = document.getElementById('themeFilter');
            select.innerHTML = '<option value="">전체 테마</option>' + themes
                .map(theme => `<option value="${theme.themeId}">${escapeHtml(theme.themeName)}</option>`)
                .join('');
            document.getElementById('themeList').innerHTML = themes
                .map(theme => `<button class="theme-chip" type="button" onclick="filterTheme(${theme.themeId})">${escapeHtml(theme.themeName)}</button>`)
                .join('');
        } catch (error) {
            document.getElementById('themeList').innerHTML = errorBox(error.message);
        }
    }

    async function loadPosts() {
        const params = new URLSearchParams({page: state.page, size: state.size});
        appendIfPresent(params, 'keyword', document.getElementById('keywordInput').value);
        appendIfPresent(params, 'themeId', document.getElementById('themeFilter').value);
        appendIfPresent(params, 'category', document.getElementById('categoryFilter').value);

        try {
            const data = await api(`/community/posts?${params.toString()}`);
            state.first = data.first;
            state.last = data.last;
            renderPostList(data);
        } catch (error) {
            document.getElementById('postList').innerHTML = errorBox(error.message);
        }
    }

    function renderPostList(data) {
        const posts = data.posts || [];
        document.getElementById('postList').innerHTML = posts.length === 0
            ? '<p class="meta">게시글이 없습니다.</p>'
            : posts.map(post => `
                <article class="post-card">
                    <button class="post-title" type="button" onclick="location.href='/community/posts/${post.postId}/view'">${escapeHtml(post.title)}${post.edited ? ' <span class="meta">(수정됨)</span>' : ''}</button>
                    <p style="margin-top:8px; color:#475467;">${escapeHtml(post.contentPreview || '')}</p>
                    <p class="meta">
                        ${escapeHtml(post.category || '-')} · ${escapeHtml(post.themeName || '테마 없음')} · ${escapeHtml(post.authorName || '-')}
                        · 작성일 ${formatDate(post.createdAt)}${post.edited ? ' · 수정됨' : ''} · 조회 ${post.viewCount} · 좋아요 ${post.likeCount}
                    </p>
                </article>
            `).join('');
        document.getElementById('pageInfo').textContent =
            `${data.totalPages === 0 ? 0 : data.page + 1} / ${data.totalPages}`;
    }

    function renderPopularPosts(posts) {
        document.getElementById('popularPosts').innerHTML = posts.length === 0
            ? '<p class="meta">인기글이 없습니다.</p>'
            : posts.map(post => `
                <button class="popular-item" type="button" onclick="location.href='/community/posts/${post.postId}/view'">
                    <strong>${escapeHtml(post.title)}${post.edited ? ' (수정됨)' : ''}</strong><br>
                    <span class="meta">작성일 ${formatDate(post.createdAt)} · 조회 ${post.viewCount} · 좋아요 ${post.likeCount}</span>
                </button>
            `).join('');
    }

    function renderPopularCommunities(themes) {
        document.getElementById('popularCommunities').innerHTML = themes.length === 0
            ? '<p class="meta">표시할 테마가 없습니다.</p>'
            : themes.map(theme => `<button class="theme-chip" type="button" onclick="filterTheme(${theme.themeId})">${escapeHtml(theme.themeName)}</button>`).join('');
    }

    function appendIfPresent(params, key, value) {
        if (value && value.trim()) {
            params.append(key, value.trim());
        }
    }

    function searchPosts() {
        state.page = 0;
        loadPosts();
    }

    function filterTheme(themeId) {
        document.getElementById('themeFilter').value = themeId;
        searchPosts();
    }

    function movePage(delta) {
        if (delta < 0 && state.first) return;
        if (delta > 0 && state.last) return;
        state.page += delta;
        loadPosts();
    }

    function errorBox(message) {
        return `<p style="color:#b42318;">${escapeHtml(message)}</p>`;
    }

    function formatDate(value) {
        return value ? String(value).replace('T', ' ').slice(0, 16) : '-';
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
