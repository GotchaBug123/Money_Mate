<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 재무 진단</title>

    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<header class="header">
    <div class="header-inner">

        <a href="/" class="logo">
            MoneyMate
        </a>

        <nav class="nav">
            <a href="/">홈</a>
            <a href="/mypage">마이페이지</a>
        </nav>

        <div class="header-buttons">
            <a href="/logout" class="login-btn">
                로그아웃
            </a>
        </div>

    </div>
</header>

<main style="padding: 60px 20px; max-width: 900px; margin: auto;">

    <h1 style="margin-bottom: 10px;">
        재무 진단
    </h1>

    <p style="margin-bottom: 40px; color: #666;">
        수입과 지출 정보를 입력하면
        투자 가능 금액을 계산합니다.
    </p>

    <form action="/financial/profile"
          method="post">

        <div style="display:flex; flex-direction:column; gap:25px;">

            <div>
                <label>월 수입</label>
                <input type="number"
                       name="monthlyIncome"
                       th:value="${profile != null ? profile.monthlyIncome : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <div>
                <label>월 고정 지출</label>
                <input type="number"
                       name="monthlyFixedExpense"
                       th:value="${profile != null ? profile.monthlyFixedExpense : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <div>
                <label>월 변동 지출</label>
                <input type="number"
                       name="monthlyVariableExpense"
                       th:value="${profile != null ? profile.monthlyVariableExpense : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <div>
                <label>총 자산</label>
                <input type="number"
                       name="totalAsset"
                       th:value="${profile != null ? profile.totalAsset : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <div>
                <label>총 부채</label>
                <input type="number"
                       name="totalLiability"
                       th:value="${profile != null ? profile.totalLiability : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <div>
                <label>현금 자산</label>
                <input type="number"
                       name="cashAsset"
                       th:value="${profile != null ? profile.cashAsset : 0}"
                       required
                       style="width:100%; padding:14px;">
            </div>

            <button type="submit"
                    style="
                    padding:16px;
                    border:none;
                    background:#2563eb;
                    color:white;
                    font-size:16px;
                    border-radius:10px;
                    cursor:pointer;
                    ">
                재무 정보 저장
            </button>

        </div>

    </form>

</main>

</body>
</html>
