<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate 관리자 - 회원 수정</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <a href="/" class="admin-logo">MoneyMate</a>
        <nav class="admin-menu">
            <a href="/admin">관리자 홈</a>
            <a href="/admin/members" class="active">회원정보 관리</a>
            <a href="/admin/investment-info">투자정보 관리</a>
            <a href="/admin/community">커뮤니티 관리</a>
            <a href="/admin/notices">공지사항 관리</a>
            <a href="/admin/inquiries">고객문의 관리</a>
            <a href="/logout">로그아웃</a>
        </nav>
    </aside>

    <main class="admin-main">
        <section class="admin-top">
            <div>
                <h1>회원 정보 수정</h1>
                <p>회원의 기본 정보와 권한 상태를 수정합니다.</p>
            </div>
        </section>

        <section class="admin-form-card">
            <form th:action="@{/admin/members/{id}/edit(id=${member.memberId})}" method="post">
                <label>아이디</label>
                <input type="text" th:value="${member.loginId}" readonly>

                <label>이름</label>
                <input type="text" name="name" th:value="${member.name}" required>

                <label>이메일</label>
                <input type="email" name="email" th:value="${member.email}" required>

                <label>권한</label>
                <select name="role">
                    <option value="USER" th:selected="${member.role == 'USER'}">USER</option>
                    <option value="ADMIN" th:selected="${member.role == 'ADMIN'}">ADMIN</option>
                </select>

                <label>상태</label>
                <select name="signupStatus">
                    <option value="ACTIVE" th:selected="${member.signupStatus == 'ACTIVE'}">ACTIVE</option>
                    <option value="INACTIVE" th:selected="${member.signupStatus == 'INACTIVE'}">INACTIVE</option>
                    <option value="BLOCKED" th:selected="${member.signupStatus == 'BLOCKED'}">BLOCKED</option>
                </select>

                <div class="admin-form-actions">
                    <a href="/admin/members" class="admin-cancel-btn">취소</a>
                    <button type="submit" class="admin-submit-btn">수정 완료</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
