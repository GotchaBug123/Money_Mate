<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="globalHeader(activeMenu)" class="header">
    <div class="header-inner">

        <a th:href="@{/}" class="logo">MoneyMate</a>

        <nav class="nav">
            <a th:href="@{/my-asset}"
               th:classappend="${activeMenu == 'asset'} ? ' active' : ''">
                MY 자산
            </a>

            <a th:href="@{/rebalancing}"
               th:classappend="${activeMenu == 'rebalancing'} ? ' active' : ''">
                리밸런싱
            </a>

            <a th:href="@{/investment-info}"
               th:classappend="${activeMenu == 'investment'} ? ' active' : ''">
                투자정보
            </a>

            <a th:href="@{/community}"
               th:classappend="${activeMenu == 'community'} ? ' active' : ''">
                커뮤니티
            </a>

            <a th:if="${session.loginUser != null and session.loginUser.role == 'ADMIN'}"
               th:href="@{/admin}"
               th:classappend="${activeMenu == 'admin'} ? ' active' : ''">
                관리자
            </a>
        </nav>

        <div class="header-buttons">
            <a th:if="${session.loginUser == null}"
               th:href="@{/login}"
               class="login-btn">
                로그인
            </a>

            <a th:if="${session.loginUser == null}"
               th:href="@{/signup}"
               class="join-btn">
                회원가입
            </a>

            <a th:if="${session.loginUser != null}"
               th:href="@{/mypage}"
               class="mypage-btn"
               th:classappend="${activeMenu == 'mypage'} ? ' active' : ''">
                마이페이지
            </a>

            <a th:if="${session.loginUser != null}"
               th:href="@{/logout}"
               class="login-btn">
                로그아웃
            </a>
        </div>

    </div>
</header>

</body>
</html>
