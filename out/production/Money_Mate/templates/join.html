<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MoneyMate - 회원가입</title>
    <link rel="stylesheet" href="/css/join.css">
</head>
<body>

<div class="join-page">
    <div class="join-box">
        <h1>회원가입</h1>
        <p class="join-desc">MoneyMate 계정을 생성해 맞춤 자산관리를 시작하세요.</p>

        <p class="error-msg" th:if="${error}" th:text="${error}"></p>

        <form action="/signup" method="post" th:object="${signupRequest}">

            <label>아이디</label>
            <input type="text"
                   th:field="*{loginId}"
                   placeholder="로그인에 사용할 아이디 입력"
                   required>

            <label>이메일</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="example@email.com"
                   required>

            <label>비밀번호</label>
            <input type="password"
                   th:field="*{password}"
                   placeholder="비밀번호 입력"
                   required>

            <label>이름</label>
            <input type="text"
                   th:field="*{name}"
                   placeholder="이름 입력"
                   required>

            <label>생년월일</label>
            <input type="date"
                   th:field="*{birthDate}"
                   required>

            <div class="terms-box">
                <label>
                    <input type="checkbox" required>
                    이용약관 동의 <span>(필수)</span>
                </label>
                <label>
                    <input type="checkbox" required>
                    개인정보 수집 및 이용 동의 <span>(필수)</span>
                </label>
            </div>

            <button type="submit" class="join-submit">회원가입 완료</button>
        </form>

        <p class="login-link">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </p>
    </div>
</div>

</body>
</html>
